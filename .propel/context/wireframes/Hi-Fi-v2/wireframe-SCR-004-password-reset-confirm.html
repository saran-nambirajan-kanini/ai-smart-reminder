<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440, initial-scale=1.0">
  <title>SCR-004 Password Reset Confirm - AI Smart Reminder</title>
  <link rel="stylesheet" href="shared-styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navigation Map
  | Element                     | Action  | Target                                         |
  |-----------------------------|---------|------------------------------------------------|
  | "Reset password" button     | Submit  | wireframe-SCR-001-login.html                   |
  -->

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="auth-layout">
    <div class="auth-card" id="main-content" style="max-width: 420px;">
      <div style="text-align: center; margin-bottom: var(--space-6);">
        <div style="width: 56px; height: 56px; background: var(--color-success-50); border-radius: var(--radius-xl); display: inline-flex; align-items: center; justify-content: center;">
          <svg width="28" height="28" fill="none" stroke="var(--color-success-500)" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
      </div>

      <h1 class="auth-title" style="font-size: var(--text-h3-size);">Set new password</h1>
      <p class="auth-subtitle">Choose a strong password for your account</p>

      <form>
        <div class="form-group">
          <label class="form-label" for="new-password">New password</label>
          <input type="password" class="form-input" id="new-password" placeholder="Min 8 characters" aria-required="true">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm password</label>
          <input type="password" class="form-input" id="confirm-password" placeholder="Re-enter password" aria-required="true">
        </div>

        <!-- Password Strength -->
        <div style="margin-bottom: var(--space-5);">
          <div style="display: flex; gap: var(--space-1); margin-bottom: var(--space-2);">
            <div style="flex: 1; height: 4px; border-radius: var(--radius-full); background: var(--color-success-500);"></div>
            <div style="flex: 1; height: 4px; border-radius: var(--radius-full); background: var(--color-success-500);"></div>
            <div style="flex: 1; height: 4px; border-radius: var(--radius-full); background: var(--color-success-500);"></div>
            <div style="flex: 1; height: 4px; border-radius: var(--radius-full); background: var(--color-neutral-200);"></div>
          </div>
          <p class="text-caption" style="color: var(--color-success-500); font-weight: 500;">Strong password</p>
        </div>

        <a href="wireframe-SCR-001-login.html" class="btn btn-primary btn-lg btn-full">Reset password</a>
      </form>
    </div>
  </div>
</body>
</html>
