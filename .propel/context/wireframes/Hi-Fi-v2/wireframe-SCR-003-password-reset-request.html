<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440, initial-scale=1.0">
  <title>SCR-003 Password Reset Request - AI Smart Reminder</title>
  <link rel="stylesheet" href="shared-styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navigation Map
  | Element                     | Action  | Target                                         |
  |-----------------------------|---------|------------------------------------------------|
  | "Send reset link" button    | Submit  | wireframe-SCR-004-password-reset-confirm.html  |
  | "Back to login" link        | Click   | wireframe-SCR-001-login.html                   |
  -->

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="auth-layout">
    <div class="auth-card" id="main-content" style="max-width: 420px;">
      <div style="text-align: center; margin-bottom: var(--space-6);">
        <div style="width: 56px; height: 56px; background: var(--color-neutral-100); border-radius: var(--radius-xl); display: inline-flex; align-items: center; justify-content: center;">
          <svg width="28" height="28" fill="none" stroke="var(--color-primary-500)" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </div>
      </div>

      <h1 class="auth-title" style="font-size: var(--text-h3-size);">Reset your password</h1>
      <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

      <form>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input type="email" class="form-input" id="email" placeholder="you@example.com" aria-required="true">
        </div>
        <a href="wireframe-SCR-004-password-reset-confirm.html" class="btn btn-primary btn-lg btn-full">Send reset link</a>
      </form>

      <p class="auth-footer">
        <a href="wireframe-SCR-001-login.html" style="font-weight: 500; display: inline-flex; align-items: center; gap: var(--space-2);">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          Back to sign in
        </a>
      </p>
    </div>
  </div>
</body>
</html>
