<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440, initial-scale=1.0">
  <title>SCR-002 Registration - AI Smart Reminder</title>
  <link rel="stylesheet" href="shared-styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navigation Map
  | Element                     | Action  | Target                                         |
  |-----------------------------|---------|------------------------------------------------|
  | "Create account" button     | Submit  | wireframe-SCR-013-dashboard.html               |
  | "Sign in" link              | Click   | wireframe-SCR-001-login.html                   |
  | Google OAuth button         | Click   | wireframe-SCR-013-dashboard.html               |
  | GitHub OAuth button         | Click   | wireframe-SCR-013-dashboard.html               |
  -->

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="auth-layout">
    <div class="auth-card" id="main-content">
      <div style="text-align: center; margin-bottom: var(--space-8);">
        <div style="width: 56px; height: 56px; background: var(--gradient-primary); border-radius: var(--radius-xl); display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3);">
          <svg width="28" height="28" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
        </div>
      </div>

      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Get started with AI-powered task management</p>

      <!-- Social -->
      <div style="display: flex; gap: var(--space-3);">
        <a href="wireframe-SCR-013-dashboard.html" class="btn-social" style="flex: 1;">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </a>
        <a href="wireframe-SCR-013-dashboard.html" class="btn-social" style="flex: 1;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#1F2328"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"/></svg>
          GitHub
        </a>
      </div>

      <div class="auth-divider">or</div>

      <form>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3);">
          <div class="form-group">
            <label class="form-label" for="first-name">First name</label>
            <input type="text" class="form-input" id="first-name" placeholder="John" aria-required="true">
          </div>
          <div class="form-group">
            <label class="form-label" for="last-name">Last name</label>
            <input type="text" class="form-input" id="last-name" placeholder="Doe" aria-required="true">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input type="email" class="form-input" id="email" placeholder="you@example.com" aria-required="true">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" class="form-input" id="password" placeholder="Min 8 characters" aria-required="true">
          <p class="form-helper">Must include uppercase, number, and special character</p>
        </div>
        <div class="form-group" style="flex-direction: row; align-items: flex-start; gap: var(--space-3);">
          <input type="checkbox" id="terms" style="accent-color: var(--color-primary-500); width: 18px; height: 18px; margin-top: 2px;" aria-required="true">
          <label for="terms" style="font-size: var(--text-body-sm-size); color: var(--color-neutral-600);">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
        </div>
        <a href="wireframe-SCR-013-dashboard.html" class="btn btn-primary btn-lg btn-full">Create account</a>
      </form>

      <p class="auth-footer">Already have an account? <a href="wireframe-SCR-001-login.html" style="font-weight: 600;">Sign in</a></p>
    </div>
  </div>
</body>
</html>
