<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440, initial-scale=1.0">
  <title>SCR-009 Reminder Modal - AI Smart Reminder</title>
  <link rel="stylesheet" href="shared-styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navigation Map
  | Element                     | Action  | Target                                         |
  |-----------------------------|---------|------------------------------------------------|
  | "Save" button               | Click   | wireframe-SCR-007-task-detail.html             |
  | "Cancel" / Close button     | Click   | wireframe-SCR-007-task-detail.html             |
  -->

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Background page (dimmed) -->
  <div class="app-shell" style="filter: blur(2px); opacity: 0.3; pointer-events: none;" aria-hidden="true">
    <nav class="sidebar"><div class="sidebar-brand"><span>AI Reminder</span></div></nav>
    <div class="main-wrapper"><header class="header"></header><main class="main-content"></main></div>
  </div>

  <!-- Modal Overlay -->
  <div class="modal-backdrop" id="main-content" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal" style="max-width: 520px;">
      <div class="modal-header">
        <h2 id="modal-title" class="modal-title">Add Reminder</h2>
        <a href="wireframe-SCR-007-task-detail.html" class="modal-close" aria-label="Close">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </a>
      </div>

      <form>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4);">
          <div class="form-group">
            <label class="form-label" for="reminder-date">Date <span class="required">*</span></label>
            <input type="date" class="form-input" id="reminder-date" aria-required="true">
          </div>
          <div class="form-group">
            <label class="form-label" for="reminder-time">Time <span class="required">*</span></label>
            <input type="time" class="form-input" id="reminder-time" aria-required="true">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="channel">Notification channel</label>
          <select class="form-select" id="channel">
            <option>Push notification</option>
            <option>Email</option>
            <option>SMS</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="message">Custom message</label>
          <textarea class="form-textarea" id="message" style="min-height: 80px;" placeholder="Optional reminder message..."></textarea>
        </div>

        <div class="form-group" style="flex-direction: row; align-items: center; gap: var(--space-3);">
          <input type="checkbox" id="recurring" style="accent-color: var(--color-primary-500); width: 18px; height: 18px;">
          <label for="recurring" class="form-label" style="margin: 0;">Repeat this reminder</label>
        </div>

        <div class="modal-footer">
          <a href="wireframe-SCR-007-task-detail.html" class="btn btn-ghost btn-md">Cancel</a>
          <a href="wireframe-SCR-007-task-detail.html" class="btn btn-primary btn-md">Save Reminder</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
